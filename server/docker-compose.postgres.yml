services:
  postgres:
    image: postgres:16-alpine
    container_name: ecopulse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ecopulse
      POSTGRES_PASSWORD: ecopulse
      POSTGRES_DB: ecopulse
    ports:
      - "5432:5432"
    volumes:
      - ecopulse_pg_data:/var/lib/postgresql/data

volumes:
  ecopulse_pg_data:
