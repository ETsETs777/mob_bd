name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Flutter analyze
        run: flutter analyze lib

      - name: Flutter test
        run: flutter test

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install server dependencies
        working-directory: server
        run: dart pub get

      - name: Server analyze
        working-directory: server
        run: dart analyze --fatal-infos

      - name: Server test
        working-directory: server
        run: dart test

  build-and-release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Read app version
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building EcoPulse $VERSION"

      - name: Install dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Build web
        run: flutter build web --release

      - name: Build split APKs
        run: flutter build apk --release --split-per-abi

      - name: Build App Bundle (Play Store)
        run: flutter build appbundle --release

      - name: Package release artifacts
        run: |
          chmod +x scripts/package-release-artifacts.sh scripts/extract-changelog-section.sh
          bash scripts/package-release-artifacts.sh "${{ steps.version.outputs.version }}"

      - name: Extract release notes
        run: bash scripts/extract-changelog-section.sh "${{ steps.version.outputs.version }}"

      - name: Verify tag matches pubspec version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          TAG="${GITHUB_REF_NAME#v}"
          if [[ "$TAG" != "$VERSION" ]]; then
            echo "Tag v$TAG does not match pubspec version $VERSION"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: EcoPulse ${{ steps.version.outputs.version }}
          body_path: release_notes.md
          files: |
            dist/*
          fail_on_unmatched_files: true
