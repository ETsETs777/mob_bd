name: ecopulse
description: EcoPulse — экономический дашборд с валютами, инфляцией и рынками.
publish_to: 'none'
version: 1.0.58+58

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  dio: ^5.8.0+1
  fl_chart: ^0.70.2
  intl: ^0.20.2
  hive_flutter: ^1.1.0
  google_fonts: ^6.2.1
  # --- UI / Design ---
  flutter_animate: ^4.5.2
  gap: ^3.0.1
  iconsax_flutter: ^1.0.0
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  local_auth: ^2.3.0
  share_plus: ^10.1.4
  app_links: ^6.4.0
  flutter_local_notifications: ^18.0.1
  flutter_staggered_animations: ^1.1.1
  workmanager: ^0.9.0+3
  home_widget: ^0.6.0
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0
  google_generative_ai: ^0.4.6
  supabase_flutter: ^2.9.0
  firebase_core: ^3.15.0
  firebase_messaging: ^15.2.0
  web_socket_channel: ^3.0.3

  smooth_page_indicator: ^1.2.0
  file_picker: ^10.3.10
  candlesticks: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  analyzer: ^7.4.5
  flutter_native_splash: ^2.4.4
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/icon/app_icon.png
  adaptive_icon_background: "#0D1117"
  adaptive_icon_foreground: assets/icon/app_icon.png

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icon/

flutter_native_splash:
  color: "#0D1117"
  color_dark: "#0D1117"
  image: assets/icon/app_icon.png
  android_12:
    color: "#0D1117"
    color_dark: "#0D1117"
    image: assets/icon/app_icon.png
